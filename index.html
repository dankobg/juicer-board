<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Juicer board</title>
		<link rel="stylesheet" href="./index.css" />
		<script type="module" src="/src/juicer-board.ts"></script>
		<script type="module">
			const jb = document.querySelector('juicer-board');
			jb.addEventListener('resizer:scale-changed', e => {
				e.stopPropagation();
				document.documentElement.style.setProperty('--board-scale', e.data.scale);
			});
		</script>
	</head>

	<body>
		<header>
			<nav></nav>
		</header>

		<div class="layout">
			<aside class="panel"></aside>
			<juicer-board
				fen="start"
				interactive
				show-ghost
				show-resizer
				coords-placement="inside"
				ranks-position="left"
				files-position="bottom"
			></juicer-board>
			<aside class="panel"></aside>
		</div>
	</body>
</html>
